<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Map Layout</title>
    <link rel="shortcut icon" href="data:image/x-icon;" type="image/x-icon">

    <!-- No Bootstrap -->

    <!-- Fontawesome CSS -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.1.2/css/all.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
  </head>
  <body>

    <div class="navbar-minimalist">
      <img src="images/logo.png">
    </div>

    <div class="container">

      <div class="cards">
        <div id="btn-rio" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/rio)">
          Rio
        </div>

        <div id="btn-berlin" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/berlin)">
          Berlin
        </div>

        <div id="btn-sao_paulo" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/sao-paulo)">
          São Paulo
        </div>

        <div id="btn-barcelona" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/barcelona)">
          Barcelona
        </div>

        <div id="btn-paris" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/paris)">
          Paris
        </div>

        <div id="btn-london" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/london)">
          London
        </div>

        <div id="btn-melbourne" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/melbourne)">
          Melbourne
        </div>

        <div id="btn-marseille" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/marseille)">
          Marseille
        </div>

        <div id="btn-buenos_aires" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/buenos-aires)">
          Buenos Aires
        </div>

        <div id="btn-bali" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/bali)">
          Bali
        </div>

        <div id="btn-mexico_city" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/mexico)">
          Mexico City
        </div>

        <div id="btn-lima" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/lima)">
          Lima
        </div>

        <div id="btn-casablanca" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/casablanca)">
          Casablanca
        </div>

        <div id="btn-lisbon" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/lisbon)">
          Lisbon
        </div>

        <div id="btn-montreal" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/montreal)">
          Montreal
        </div>

        <div id="btn-nantes" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/nantes)">
          Nantes
        </div>

        <div id="btn-mauritius" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/mauritius)">
          Mauritius
        </div>

        <div id="btn-tokyo" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/tokyo)">
          Tokyo
        </div>

        <div id="btn-amsterdam" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/amsterdam)">
          Amsterdam
        </div>

        <div id="btn-lyon" class="card" style="background-image: url(http://kitt.lewagon.com/placeholder/cities/lyon)">
          Lyon
        </div>
      </div>

      <!-- Change the token below (https://www.mapbox.com/account/access-tokens/) -->
      <div id="map"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <script src="script.js"></script>
  </body>
</html>
